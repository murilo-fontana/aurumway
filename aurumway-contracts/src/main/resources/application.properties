spring.application.name=aurumway-contracts
server.port=8083

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5435/contracts
spring.datasource.username=${DB_USERNAME:contracts}
spring.datasource.password=${DB_PASSWORD:contracts}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:aurumway-super-secret-key-that-is-at-least-32-bytes-long}
jwt.expiration-hours=24

# Billing service URL (for invoice generation)
billing.service.url=${BILLING_SERVICE_URL:http://localhost:8082}
