spring.application.name=aurumway-payments
server.port=8081

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5434/payments
spring.datasource.username=payments
spring.datasource.password=payments
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:aurumway-super-secret-key-that-is-at-least-32-bytes-long}
jwt.expiration-hours=24

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
