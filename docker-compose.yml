services:
  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: aurum
      RABBITMQ_DEFAULT_PASS: aurum

  billing-db:
    image: postgres:16
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
    ports: ["5433:5432"]

  payments-db:
    image: postgres:16
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    ports: ["5434:5432"]

  contracts-db:
    image: postgres:16
    environment:
      POSTGRES_DB: contracts
      POSTGRES_USER: contracts
      POSTGRES_PASSWORD: contracts
    ports: ["5435:5432"]