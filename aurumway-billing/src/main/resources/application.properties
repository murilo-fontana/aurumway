spring.application.name=aurumway-billing
server.port=8082

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/billing
spring.datasource.username=${DB_USERNAME:billing}
spring.datasource.password=${DB_PASSWORD:billing}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:aurumway-super-secret-key-that-is-at-least-32-bytes-long}
jwt.expiration-hours=24
